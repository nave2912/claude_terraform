framework:
  - terraform
  - json

directory:
  - .

skip-path:
  - modules/_module_template
  - tests

# Each entry here is a deliberate, justified bypass — not a blanket
# suppression.
skip-check:
  # LRS is the module's default replication tier, kept for cost in this
  # dev/learning subscription. Callers can opt into ZRS/GRS per-entry via
  # account_replication_type in the JSON model; this is not an oversight.
  - CKV_AZURE_206
  # This account has is_hns_enabled = true (ADLS Gen2). Azure's Queue
  # service does not exist on HNS-enabled accounts, so there is no queue
  # endpoint to configure logging on — the check is inapplicable, not
  # unaddressed.
  - CKV_AZURE_33
  # This module's entire purpose is static_website (public internet-facing
  # content hosting). Disabling public network access would make the site
  # unreachable unless a CDN/Front Door + Private Link sits in front of it,
  # which doesn't exist yet. Same reasoning for CKV2_AZURE_33 below.
  - CKV_AZURE_59
  - CKV2_AZURE_33
  # Customer-managed-key encryption needs a Key Vault + Key + identity
  # wiring, none of which exists in this framework yet — see
  # ARCHITECTURE.md §9 ("no Key Vault module yet").
  - CKV2_AZURE_1
  # The module already sets sftp_enabled = false explicitly, which is the
  # only mechanism that creates local users in Azure Storage — this is the
  # real, complete fix for "avoid local users," but this checkov version
  # doesn't recognize sftp_enabled as satisfying the check. Bypassed because
  # the underlying config is already correct, not because the finding was
  # ignored.
  - CKV_AZURE_244

  # --- modules/container_registry (Basic SKU, deliberately) ---
  # Vulnerability scanning, image quarantine/signing, dedicated data
  # endpoints, and zone redundancy are all Premium-tier-only ACR features.
  # Premium is ~$40/day vs. Basic's ~$0.17/day — a deliberate cost tradeoff
  # for this dev/platform-tooling registry, not an oversight. Revisit if
  # this registry ever needs to hold anything beyond the chatbot's own
  # backend image.
  - CKV_AZURE_163 # vulnerability scanning
  - CKV_AZURE_164 # signed/trusted images
  - CKV_AZURE_237 # dedicated data endpoints
  - CKV_AZURE_166 # image quarantine/scan
  - CKV_AZURE_233 # zone redundancy
  - CKV_AZURE_167 # untagged manifest retention policy
  # Geo-replication is also Premium-tier-only — this is a single-region
  # dev/platform-tooling registry, not a multi-region deployment.
  - CKV_AZURE_165
  # Disabling public network access requires a Private Endpoint, which
  # requires Premium SKU + VNET integration — neither exists in this
  # framework yet (no VNET wiring for platform-tooling resources). The
  # registry is still auth-gated (admin_enabled = false, AAD/managed-identity
  # pull only), just not network-isolated.
  - CKV_AZURE_139

  # --- modules/key_vault ---
  # purge_protection_enabled defaults to false and is a documented,
  # intentional module input (see modules/key_vault/README.md) — allows
  # reusing a vault name immediately after destroy for dev/platform-tooling
  # vaults. Not appropriate for a vault holding long-lived production
  # secrets; callers can set purge_protection_enabled = true per-instance.
  - CKV_AZURE_110
  # network_acls IS explicitly configured (bypass = "AzureServices"), but
  # this check specifically requires default_action = "Deny" to pass.
  # Deny would block `terraform apply` itself — GitHub-hosted Actions
  # runners have dynamic public IPs not covered by the AzureServices
  # bypass, and there's no self-hosted-runner/VNET setup to exempt CI from
  # the firewall. Same underlying gap as CKV_AZURE_189/CKV2_AZURE_32 below.
  - CKV_AZURE_109
  # Disabling public network access needs a Private Endpoint (same Premium +
  # VNET gap as the registry above).
  - CKV_AZURE_189
  - CKV2_AZURE_32

  # --- modules/service_plan (Basic/Standard SKU, dev tier) ---
  # Zone redundancy (zone_balancing_enabled) requires Premium v2/v3 (or
  # equivalent Elastic Premium) SKUs with at least 3 workers — it does not
  # exist as a capability on Basic/Standard tiers at all. This is a
  # dev/cost-tier service plan, same tradeoff already made for the Basic
  # container registry above; revisit per-instance if a plan is ever
  # upgraded to a Premium SKU.
  - CKV_AZURE_225

download-external-modules: false

compact: true
quiet: false

# Fail the build on any MEDIUM severity or higher finding.
soft-fail: false
