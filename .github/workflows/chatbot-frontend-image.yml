name: chatbot-frontend-swa

# Builds and deploys chatbot/frontend to the "naveenkumar" Azure Static Web
# App (azure-learning-dev, provisioned by environments/dev/main.tf's
# static_web_app module). Next.js hybrid rendering (SSR + the server-side
# Route Handlers under src/app/api/*) is built by Oryx inside the deploy
# action itself -- there's no separate docker build/push step here.

on:
  push:
    branches: [main]
    paths:
      - "chatbot/frontend/**"
      - ".github/workflows/chatbot-frontend-swa.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - "chatbot/frontend/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GH_TOKEN }}
          action: "upload"
          app_location: "chatbot/frontend"
          api_location: ""
          output_location: ""
          # BACKEND_BASE_URL / BACKEND_API_KEY / ANTHROPIC_API_KEY are read
          # server-side by the Route Handlers at request time -- they must
          # be set as Application settings on the Static Web App itself
          # (az staticwebapp appsettings set / Portal > Configuration), not
          # baked in at build time here.

  close-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Close Azure Static Web Apps PR preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
